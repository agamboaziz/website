<form class="container mt-5" style="max-width:450px;color:green;">

    <h1 class="h3 mb-3 fw-normal text-center">sign in</h1>

    <div class="form-group">
        <label>Name</label>
        <input type="text" class="form-control" placeholder="Enter Your Name">
    </div>

    <div class="form-group">
        <label>Last Name</label>
        <input type="text" class="form-control" placeholder="Enter Your Last Name">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" class="form-control" id="email" placeholder="Enter email">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="password" placeholder="Password">
    </div>

    <div class="form-group mt-3 text-center " style="color: green;" >
        <button onclick="signup()" type="button" class="btn btn-success w-100" > Sign Up </button>  
    </div>

    <div id="signup-alert" class="alert d-none mt-3"></div>
</form>
