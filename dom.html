<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
    <link rel="stylesheet" href="style.css">  
    <title>Document</title>
    <style>
        .show{
            display:none;
        }
    </style>
</head>
<body>
    
           <form class="container mt-5" style="max-width: 450px; color: green;">
          <div class="form-group">
            <h1 class="h3 mb-3 fw-normal text-center">Log-in</h1>
            <label for="email">Email address</label>
            <input type="email" class="form-control" id="email"  placeholder="Enter email">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Password">
          </div>
          <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
             <label class="form-check-label" for="exampleCheck1">Rememer me</label>
          </div>
          <div class="alert alert-danger show" id="alert">
             invalid email or password
          </div>
          <button onclick="saveUser()" type="button" class="btn btn-success">Log-in</button>
      </form>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
      <script>
        function saveUser(){

         email = document.getElementById("email").value
         password = document.getElementById("password").value

          document.getElementById("alert").style.display = "none" 
         if(password.length<8 || email.indexOf('@') == -1){
          console.log("invalid email or password")
          document.getElementById("alert").style.display = "block"   
         }
         else{
            console.log(email)
         }

        }

        

      </script>
</body>
</html>
