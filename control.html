<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
    </div>

<div class="row g-4">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Live ESP32-CAM</h5>
        <div class="ratio ratio-16x9 border rounded overflow-hidden">
          <img id="ipcam" alt="ESP32-CAM stream" style="object-fit: contain;">
          </div>
      </div>
    </div>
  </div>

<div class="col-lg-4">
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title">Mode</h5>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="autoSwitch" onChange="auto()"> 
          <label class="form-check-label" for="autoSwitch">servo</label>
        </div>
        <p class="mt-2 mb-0">LDR value: <strong id="ldrValue">-</strong></p>
      </div>

      <p id="lightText"></p>
      <img src="" alt="" id="lightAmount">

       <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="autoMatic" onChange="automatic()"> 
          <label class="form-check-label" for="autoMatic">automatic</label>
        </div>
    </div>
  </div>
</div>


<div class="container">
  <div class="row">
    <div class="col-12 col-md-6 mb-4">
      <div class="card h-100">
        <div class="card-header text-center">
          <h2>רובוט עבודה</h2>
        </div>

        <div class="card-body">
          <div class="grid-container">
            <div class="column">
              <h4 class="text-center">Left</h4>
              <button class="btn-percent" id="2">25%</button>
              <button class="btn-percent" id="6">50%</button>
              <button class="btn-percent" id="10">75%</button>
              <button class="btn-percent" id="14">100%</button>
            </div>

            <div class="column">
              <h4 class="text-center">Right</h4>
              <button class="btn-percent" id="1">25%</button>
              <button class="btn-percent" id="5">50%</button>
              <button class="btn-percent" id="9">75%</button>
              <button class="btn-percent" id="13">100%</button>
            </div>
          </div>

          <div class="text-center mt-3">
            <button class="btn-percent" id="0" style="background-color: red;">STOP</button>
          </div>
        </div>
      </div>
    </div>


   
    <div class="col-12 col-md-6 mb-4">
      <div class="card h-100">
        <div class="card-header text-center">
          <h2>רובוט שירות</h2>
        </div>

        <div class="card-body">
          <div class="grid-container">
            <div class="column">
              <h4 class="text-center">Left</h4>
              <button class="btn-percent" id="66">25%</button>
              <button class="btn-percent" id="70">50%</button>
              <button class="btn-percent" id="74">75%</button>
              <button class="btn-percent" id="78">100%</button>
            </div>

            <div class="column">
              <h4 class="text-center">Right</h4>
              <button class="btn-percent" id="65">25%</button>
              <button class="btn-percent" id="69">50%</button>
              <button class="btn-percent" id="73">75%</button>
              <button class="btn-percent" id="77">100%</button>
            </div>

          </div>
          <div class="text-center mt-3">
            <button class="btn-percent" id="64" style="background-color: red;" >STOP</button>
          </div>
          
        </div>
      </div>
</div>
<div class="card" style="width: 220px; margin: auto; padding: 10px; text-align: center;">
    <h4 style="font-size: 16px; margin: 5px 0;">מצב אוטומט</h4>
    
    <div style="margin-bottom: 10px;">
        <p style="font-size: 13px; margin: 5px;">מספר סיבובים</p>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 3px;">
            <button type="button" class="btn-percent" onclick="updateCycles(1)" style="padding: 2px 6px;">1</button>
            <button type="button" class="btn-percent" onclick="updateCycles(2)" style="padding: 2px 6px;">2</button>
            <button type="button" class="btn-percent" onclick="updateCycles(3)" style="padding: 2px 6px;">3</button>
            <button type="button" class="btn-percent" onclick="updateCycles(4)" style="padding: 2px 6px;">4</button>
            <button type="button" class="btn-percent" onclick="updateCycles(5)" style="padding: 2px 6px;">5</button>
            <button type="button" class="btn-percent" onclick="updateCycles(6)" style="padding: 2px 6px;">6</button>
            <button type="button" class="btn-percent" onclick="updateCycles(7)" style="padding: 2px 6px;">7</button>
        </div>
    </div>
    <div style="margin-bottom: 10px;">
        <p style="font-size: 13px; margin: 5px;">מהירות</p>
        <div style="display: flex; justify-content: center; gap: 3px;">
            <button type="button" class="btn-percent" onclick="updateSpeed('00')" style="padding: 3px; font-size: 11px;">25%</button>
            <button type="button" class="btn-percent" onclick="updateSpeed('01')" style="padding: 3px; font-size: 11px;">50%</button>
            <button type="button" class="btn-percent" onclick="updateSpeed('10')" style="padding: 3px; font-size: 11px;">75%</button>
            <button type="button" class="btn-percent" onclick="updateSpeed('11')" style="padding: 3px; font-size: 11px;">100%</button>
        </div>
    </div>

    <button type="button" onclick="sendToFirebase()" style="background: red;
    color: white; border: none; padding: 5px 15px; border-radius: 4px; 
    cursor: pointer; font-size: 12px; width: 100%;">START</button>
    
    <div style="margin-top: 10px; font-size: 11px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px;">
        toAltera: <span id="bin-output" style="color: #2ebd1e;">10100000</span>
    </div>
</div>




  

  </main>
  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-database-compat.js"></script>
  <script src="js/app.js"></script>
  <script src="js/control.js"></script>
  

</body>
</html>
